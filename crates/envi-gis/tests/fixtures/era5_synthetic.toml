# SYNTHETIC ERA5 single-level fixture for the METX-02 Obukhov + wind×stability
# occurrence-statistics derivation (09-03 Task 2). NOT captured CDS data — no key,
# no network, no Python needed at test time (mirrors tests/fixtures/cog + the
# scipy-oracle pattern). Hand-authored to exercise: daytime UNSTABLE (ishf < 0,
# ECMWF downward-positive), night STABLE (ishf > 0), near-neutral (ishf ≈ 0), and
# every wind-speed bin. The expected 1/L was computed by an INDEPENDENT
# reimplementation of the ECMWF Obukhov recipe (u* = √(|τ|/ρ), θ* = −ishf/(ρ·c_p·u*),
# 1/L = −κ·g·θ*/(T_v·u*²); T_v from Tetens vapour pressure). Occurrence statistics
# ONLY (D-05) — NO class → A/B/C, NO L_den. The bin edges are [ASSUMED]; only the
# counting + the 1/L sign/magnitude are validated, never a FORCE numeric weather pass.
# SHA/provenance banner mirrors the committed-COG fixtures.

[meta]
# Absolute tolerance on the hour-0 inverse Obukhov length (independent-recipe oracle).
inv_l_tol = 1e-4
# Hour 0 (daytime, ishf = -120 W/m², |τ| from iews/inss) inverse Obukhov length, m⁻¹.
inv_l_hour0 = -0.02771232

[expected]
total = 6
reliable = 6
# counts[wind_bin][stability] with stability order [Unstable, Neutral, Stable] and
# wind bins [<2, 2–5, 5–8, ≥8] m/s.
counts = [[0, 0, 1], [2, 0, 1], [1, 0, 0], [0, 1, 0]]

# --- Hours (SI units, ECMWF short names) ---

# h0: daytime unstable, wind √(4²+2²)=4.47 m/s → bin 1 (2–5).
