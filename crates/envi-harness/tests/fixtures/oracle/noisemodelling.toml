# NoiseModelling CNOSSOS-EU cross-validation fixture (VAL-03) — DO NOT hand-edit values.
# Regeneration is operator-driven and one-time: see tools/noisemodelling_oracle/README.md.
# The Rust suite reads ONLY this committed TOML — no Java / network / credentials at test time.
#
# ⛔ PLACEHOLDER: Java is not installed on the machine that produced this repo state, so the
#    per-band CNOSSOS values below are ZERO placeholders and `[meta] placeholder = true`.
#    The oracle_noisemodelling.rs tests therefore SKIP (honest fail-soft — never a false Pass),
#    printing a pointer to the regeneration recipe. Run the recipe once (Java present) and set
#    placeholder = false with the exported per-octave-band Adiv/Aatm/Abar/Aground.

[meta]
oracle = "NoiseModelling v6.0.0 (CNOSSOS-EU, Directive (EU) 2015/996)"
nm_version = "v6.0.0"
generator = "human-run recipe: tools/noisemodelling_oracle/README.md"
provenance = "PLACEHOLDER — NoiseModelling not yet run (Java absent on generating machine)"
generated_date = "PENDING"
placeholder = true
# Scene provenance: sha256[:16] of the committed scene files that these numbers must
# be generated from. A changed scene must invalidate stale numbers (recompute + regenerate).
scene_free_field_sha256 = "c495f8c3353eb5ac"
scene_thin_barrier_sha256 = "2f1d399c610d49a4"
scene_soft_ground_sha256 = "98a2afe1bc91ece4"
# Geometry shared by all scenes (source 0.5 m, receiver 1.5 m, horizontal 100 m).
