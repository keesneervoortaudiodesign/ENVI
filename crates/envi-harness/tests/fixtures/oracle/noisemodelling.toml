# Atmosphere (FORCE parameters).
atmosphere_t_c = 15.0
atmosphere_rh_percent = 70.0
atmosphere_pressure_kpa = 101.325
# Equality-gate tolerances (only for genuinely-identical physics).
divergence_tol_db = 0.1
air_absorption_tol_db = 0.2
# Air absorption at 8 kHz (band index 100): ENVI's Eq.287 band conversion vs CNOSSOS's
# α·d/1000 centre value may exceed the 0.2 dB gate (band-averaging vs centre). Documented,
# not forced — reported against this looser documented bound instead of a hard failure.
