[package]
name = "envi-compute-wasm"
description = "ENVI browser compute boundary — the thin wasm-bindgen cdylib over the pure envi-compute core (cost/tiers) plus the OPFS-backed TensorSink and the wasm-bindgen-rayon pool seam. Boundary ONLY: marshalling, no acoustic/cost math. Wire DTOs are ts-rs-generated (D-10)."
version.workspace = true
edition.workspace = true
rust-version.workspace = true

# The second WASM crate in the repo (mirrors `envi-gis-wasm`). It is a thin cdylib
# wrapper around the pure `envi-compute` core — the ONLY place the browser compute
# boundary lives; it holds no cost/tier/acoustic logic (delegates to envi-compute
# and the FORCE-validated `envi_engine::solver::solve`). `rlib` is added alongside
# `cdylib` so the native `cargo test` harness (OPFS-sink round-trip tests) and
# envi-service's no-drift test can see the boundary DTOs; the wasm bundle uses only
# the `cdylib` output.
#
# wasm-bindgen is version-PINNED with `=` (Pitfall 8): the `wasm-bindgen-cli` used
# in the Vite build MUST be installed at this EXACT version (0.2.126). The threaded
# module (see web/README.md) is generated by the same pinned CLI.
# No getrandom/uuid (Pitfall 9) — ids are minted in TS via crypto.randomUUID().
[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
# envi-compute (pure, WASM-safe core): the cost model + hierarchical tier partition
# the boundary marshals into. The boundary calls exactly one core fn per export.
envi-compute = { path = "../envi-compute" }
# envi-engine (pure-math, WASM-safe): the OPFS sink implements the engine's own
# `tensor::TensorSink` trait and names `Complex<f64>` + `SinkError`; the engine's
# 3-dep quarantine is untouched — this crate adds nothing to envi-engine.
envi-engine = { path = "../envi-engine" }
# ndarray/num-complex: the sink's `put_chunk` receives `ArrayView3<Complex<f64>>` /
# `ArrayView3<f64>` chunk views — naming those engine view types at the boundary
# needs both crates directly (already transitive via envi-engine; no version drift).
ndarray = "0.17"
num-complex = "0.4"
wasm-bindgen = "=0.2.126"
js-sys = "0.3"
serde-wasm-bindgen = "0.6.5"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "2"
# blake3 (WASM-safe; already in the graph via envi-compute) — the marshalled-scene
# tensor-identity hash (HI-01 / D-09). Names the same primitive `envi-compute`'s
# `identity::tensor_hash` uses, so the OPFS/manifest key is a real blake3 digest
# over every tensor-affecting field, never a JS-side ad-hoc hash.
blake3 = "1"
# ts-rs (D-10): derive the committed TS mirror on the boundary DTOs. The generator
# (fs export) is only ever invoked by the native no-drift test; the trait itself
# is pure-Rust and compiles for wasm32 (it never runs on the wasm path).
ts-rs = { version = "12", features = ["no-serde-warnings"] }

# The threaded (SharedArrayBuffer) rayon pool + the `initThreadPool` glue are gated
# behind the `threads` feature so the STABLE, single-threaded builds — native
# `cargo test`, the wasm32 no-atomics smoke build (10-03 acceptance), and the
# envi-service no-drift rlib — never compile `wasm-bindgen-rayon`/`rayon`. Only the
# `build:wasm:compute` nightly+atomics script (10-03 Task 3) enables `threads`.
# Both packages are OK-verdict in 10-RESEARCH's Package Legitimacy Audit
# (RReverser-authored / ecosystem-standard). wasm-bindgen-rayon 1.3.0 depends on
# `wasm-bindgen = "0.2"` (caret), which the repo's `=0.2.126` pin satisfies (A1).
[dependencies.wasm-bindgen-rayon]
version = "1.3.0"
optional = true

# rayon is the caller-side data-parallel driver (pool.rs). It is a NORMAL
# dependency on NATIVE targets so `cargo test -p envi-compute-wasm pool` exercises
# the real `par_iter` sharding driver, the cancel-lands-clean path, and the SC3
# working-set high-water bound with an actual multi-thread pool — none of which
# would be reachable if rayon were gated off natively.
[target.'cfg(not(target_arch = "wasm32"))'.dependencies]
rayon = "1.10"

# On wasm32 rayon is OPTIONAL and `threads`-gated, so the STABLE, single-threaded
# wasm build (`cargo build --target wasm32-unknown-unknown`, no atomics) never
# pulls the atomics-requiring rayon; only the nightly + `-Zbuild-std` + atomics
# `build:wasm:compute` script (which turns on `threads`) compiles it alongside
# `wasm-bindgen-rayon` (Pitfall 1 — the atomics toolchain never leaks).
[target.'cfg(target_arch = "wasm32")'.dependencies.rayon]
version = "1.10"
optional = true

[features]
# Enabled ONLY by the threaded build (`build:wasm:compute`). Off for every stable
# and native build so the atomics/nightly toolchain never leaks (Pitfall 1).
threads = ["dep:wasm-bindgen-rayon", "dep:rayon"]
