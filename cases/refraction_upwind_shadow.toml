# Synthetic upwind (upward-refraction / shadow-zone) property case (Phase 3,
# plan 03-01).
#
# Strong negative gradient ⇒ ξ<0; at the anchor distance the receiver sits
# beyond 0.95·dSZ, so the Sub-model 1 shadow branch (Eq. 121) subtracts the
# equivalent-wedge shadow-zone shielding L_SZ. Like the downwind case it stays
# capability-gated (Skipped, D-03) until the 03-02/03-03 weather-route wiring
# feeds [weather] into terrain_effect. The engine shadow path is property-tested
# in-crate (refraction_direction / refraction_finiteness).

[meta]
name = "upwind refraction shadow zone, flat sigma=200, hs=0.5 hr=1.5 d=97.5"
kind = "refraction"
reference = "analytic"

[source]
position = [2.5, 0.0, 0.5]

[receiver]
position = [100.0, 0.0, 1.5]

[atmosphere]
t_air_c = 15.0
cv2 = 0.0
ct2 = 0.0

# Documentary log-lin profile: negative A/B ⇒ upward refraction (ξ<0), shadow.
[weather]
a = -1.5
b = -0.08
z0 = 0.01

[[terrain]]
x = 2.5
z = 0.0
sigma_kpa = 200.0
roughness = 0.0

[[terrain]]
x = 100.0
z = 0.0
sigma_kpa = 200.0
roughness = 0.0

[expected]
tolerance_db = 1.0
bands = "none"
